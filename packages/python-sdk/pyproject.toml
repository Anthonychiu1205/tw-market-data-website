[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "twmarketdata-sdk"
version = "0.1.0"
description = "TW Market Data Python SDK (local preview)"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Proprietary" }
authors = [
  { name = "TW Market Data" }
]
dependencies = [
  "requests>=2.31.0"
]

[tool.setuptools]
packages = ["twmarketdata"]
