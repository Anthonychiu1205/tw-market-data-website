# HARD-01 P0-4 (frontend): dependency-vulnerability gate. Runs `npm audit` on every PR and push to
# main, plus a weekly sweep so newly-disclosed advisories surface even without a code change. The
# gate fails on high/critical; an informational step always prints the full report first so the log
# shows exactly what to fix. `npm audit` reads package-lock.json directly — no install needed.
name: Security audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1" # Mondays 03:00 UTC

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: npm audit — full report (informational)
        run: npm audit || true
      - name: npm audit — fail on high / critical
        run: npm audit --audit-level=high
